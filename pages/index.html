<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastMCP Benchmarks</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header h1 a { color: var(--accent); text-decoration: none; }
    header .badge { font-size: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; color: var(--muted); }
    .status { font-size: 0.875rem; color: var(--muted); margin-bottom: 24px; }
    .status .ts { color: var(--accent); }
    .group { margin-bottom: 32px; }
    .group h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .card .name { font-size: 0.875rem; font-weight: 600; margin-bottom: 4px; }
    .card .value { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .card .value .unit { font-size: 0.875rem; font-weight: 400; color: var(--muted); }
    .card .meta { display: flex; gap: 12px; font-size: 0.75rem; color: var(--muted); flex-wrap: wrap; }
    .card .meta span { white-space: nowrap; }
    .sparkline { width: 100%; height: 40px; margin: 8px 0; }
    .sparkline polyline { fill: none; stroke: var(--accent); stroke-width: 1.5; }
    .sparkline .area { fill: var(--accent); opacity: 0.1; stroke: none; }
    .loading { text-align: center; padding: 64px; color: var(--muted); font-size: 1.125rem; }
    .error { text-align: center; padding: 64px; color: var(--red); }
    footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
    .improve { color: var(--green); }
    .regress { color: var(--red); }
    .delta { font-size: 0.75rem; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ <a href="https://github.com/strawgate/fastmcp">FastMCP</a> Benchmarks</h1>
      <span class="badge">powered by octo11y</span>
    </header>
    <div id="status" class="status">Loading…</div>
    <div id="content"><div class="loading">Fetching benchmark data…</div></div>
    <footer>
      Data from <a href="https://github.com/strawgate/fastmcp/tree/bench-data">bench-data</a> branch
      · Tracked by <a href="https://github.com/strawgate/octo11y">octo11y</a>
      · <a href="https://github.com/strawgate/fastmcp/actions/workflows/benchmarks.yml">Workflow runs</a>
    </footer>
  </div>
  <script>
    const OWNER = "strawgate";
    const REPO = "fastmcp";
    const BRANCH = "bench-data";
    const BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}`;

    const GROUP_ORDER = ["import", "server-construction", "tool-call", "mount", "stdio"];
    const GROUP_LABELS = {
      "import": "Import Time",
      "server-construction": "Server Construction",
      "tool-call": "Tool Calls (in-memory client)",
      "mount": "Server Mounting",
      "stdio": "Stdio Transport",
    };

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}: ${url}`);
      return r.json();
    }

    function fmtValue(v) {
      if (v >= 1_000_000) return (v / 1_000_000).toFixed(1) + "M";
      if (v >= 1000) return (v / 1000).toFixed(1) + "K";
      return v % 1 === 0 ? String(v) : v.toFixed(2);
    }

    function fmtName(name) {
      return name
        .replace(/^test_/, "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function sparklineSVG(points) {
      if (!points || points.length < 2) return "";
      const vals = points.map(p => p.value);
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min || 1;
      const w = 300, h = 40, pad = 2;
      const coords = vals.map((v, i) => {
        const x = pad + (i / (vals.length - 1)) * (w - 2 * pad);
        const y = pad + (1 - (v - min) / range) * (h - 2 * pad);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const line = coords.join(" ");
      const area = `${pad},${h - pad} ${line} ${w - pad},${h - pad}`;
      return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polygon class="area" points="${area}" />
        <polyline points="${line}" />
      </svg>`;
    }

    function deltaHTML(points) {
      if (!points || points.length < 2) return "";
      const prev = points[points.length - 2].value;
      const curr = points[points.length - 1].value;
      if (prev === 0) return "";
      const pct = ((curr - prev) / prev * 100).toFixed(1);
      const cls = curr < prev ? "improve" : curr > prev ? "regress" : "";
      const sign = curr < prev ? "" : "+";
      return `<span class="delta ${cls}">${sign}${pct}%</span>`;
    }

    async function main() {
      const content = document.getElementById("content");
      const status = document.getElementById("status");

      try {
        const idx = await fetchJson(`${BASE}/data/index.json`);
        const metrics = idx.metrics || [];

        if (metrics.length === 0) {
          content.innerHTML = `<div class="loading">No benchmark data yet. Run the Benchmarks workflow first.</div>`;
          status.textContent = "No data available";
          return;
        }

        // Fetch all series files
        const seriesMap = new Map();
        const results = await Promise.allSettled(
          metrics.map(async m => {
            const sf = await fetchJson(`${BASE}/data/series/${m}.json`);
            return [m, sf];
          })
        );
        for (const r of results) {
          if (r.status === "fulfilled") seriesMap.set(r.value[0], r.value[1]);
        }

        // Group benchmarks by group tag
        const benchmarks = new Map(); // name -> { metrics, group, latest }
        for (const [metricName, sf] of seriesMap) {
          for (const [seriesName, entry] of Object.entries(sf.series || {})) {
            let bench = benchmarks.get(seriesName);
            if (!bench) {
              const group = entry.tags?.["benchkit.scenario"] || entry.tags?.group || "ungrouped";
              bench = { name: seriesName, group, metrics: new Map(), latestTs: "", latestCommit: "" };
              benchmarks.set(seriesName, bench);
            }
            const pts = entry.points || [];
            const latest = pts[pts.length - 1];
            if (latest) {
              bench.metrics.set(metricName, {
                value: latest.value,
                points: pts,
                unit: sf.unit,
                direction: sf.direction,
              });
              if (latest.timestamp > bench.latestTs) {
                bench.latestTs = latest.timestamp;
                bench.latestCommit = latest.commit || "";
              }
            }
          }
        }

        // Group by scenario
        const groups = new Map();
        for (const bench of benchmarks.values()) {
          if (!groups.has(bench.group)) groups.set(bench.group, []);
          groups.get(bench.group).push(bench);
        }

        // Find latest timestamp
        let latestTs = "";
        for (const bench of benchmarks.values()) {
          if (bench.latestTs > latestTs) latestTs = bench.latestTs;
        }
        status.innerHTML = latestTs
          ? `Last updated: <span class="ts">${timeAgo(latestTs)}</span> · ${benchmarks.size} benchmarks · ${seriesMap.size} metrics`
          : "No data";

        // Render
        let html = "";
        const sortedGroups = [...groups.keys()].sort((a, b) => {
          const ai = GROUP_ORDER.indexOf(a);
          const bi = GROUP_ORDER.indexOf(b);
          return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
        });

        for (const group of sortedGroups) {
          const benches = groups.get(group);
          benches.sort((a, b) => a.name.localeCompare(b.name));
          html += `<div class="group"><h2>${GROUP_LABELS[group] || group}</h2><div class="cards">`;
          for (const bench of benches) {
            // Pick a primary metric (prefer median, then first)
            const primary = bench.metrics.get("median") || bench.metrics.values().next().value;
            if (!primary) continue;
            const unit = primary.unit || "";
            html += `<div class="card">
              <div class="name">${fmtName(bench.name)}</div>
              <div class="value">${fmtValue(primary.value)} <span class="unit">${unit}</span>${deltaHTML(primary.points)}</div>
              ${sparklineSVG(primary.points)}
              <div class="meta">
                <span>📊 ${primary.points.length} runs</span>
                ${bench.latestTs ? `<span>🕐 ${timeAgo(bench.latestTs)}</span>` : ""}
                ${bench.latestCommit ? `<span>🔗 <a href="https://github.com/${OWNER}/${REPO}/commit/${bench.latestCommit}" style="color:var(--accent)">${bench.latestCommit.slice(0, 7)}</a></span>` : ""}
              </div>
            </div>`;
          }
          html += "</div></div>";
        }
        content.innerHTML = html;
      } catch (e) {
        if (e.message.includes("404")) {
          content.innerHTML = `<div class="loading">
            <p>No benchmark data yet.</p>
            <p style="margin-top:12px;font-size:0.875rem">The <code>bench-data</code> branch will be created after the first successful
            <a href="https://github.com/${OWNER}/${REPO}/actions/workflows/benchmarks.yml" style="color:var(--accent)">Benchmarks workflow</a> run on main.</p>
          </div>`;
          status.textContent = "Waiting for first benchmark run";
        } else {
          content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
          status.textContent = "Error loading data";
        }
      }
    }

    main();
  </script>
</body>
</html>
